[pytest]
; Il codice del backend usa import "assoluti" tipo "import models" (non
; "backend.models"), esattamente come quando l'app gira con
; "uvicorn main:app" da dentro la cartella backend/. Questa riga aggiunge
; backend/ al sys.path anche quando pytest viene lanciato da altre cartelle.
pythonpath = .
testpaths = tests
